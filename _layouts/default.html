---
layout: default
---

<style>
  /* 1. SCREEN VIEW (DARK) */
  @media screen {
    #main_content_wrap {
      background-color: #0d1117 !important;
      display: flex !important;
      justify-content: center !important;
    }
    #main_content {
      color: #c9d1d9 !important;
      background-color: #0d1117 !important;
    }
  }

  /* 2. PRINTER VIEW (FORCED WHITE) */
  @media print {
    /* Target the main containers */
    #main_content_wrap, #main_content, body, html {
      background: white !important;
      background-color: white !important;
      color: black !important;
    }

    /* THE FIX: Target EVERY possible code container Slate/Jekyll uses */
    div.highlighter-rouge, 
    div.highlight, 
    figure.highlight, 
    pre.highlight, 
    .highlight pre,
    pre {
      background: #f5f5f5 !important;
      background-color: #f5f5f5 !important;
      color: black !important;
      border: 1px solid #ddd !important;
    }

    /* Ensure the actual text inside the code block isn't white */
    .highlight code, pre code, .highlight span {
      color: black !important;
      background: transparent !important;
    }

    /* Hide the line numbers for cleaner printing if they are dark */
    .lineno {
      color: #999 !important;
      border-right: 1px solid #eee !important;
    }
  }

  /* 3. SHARED LAYOUT (Centering) */
  #main_content {
    max-width: 1200px !important;
    width: 95% !important;
    margin: 0 auto !important;
    padding: 40px 40px !important;
    float: none !important;
  }
  img {
    max-width: 95% !important;
    height: auto !important;
    display: block;
    margin: 20px auto;
  }


  /* ... keep your existing screen/centering code ... */

  /* 4. SMOOTH SOLID HORIZONTAL LINES */
  hr {
    border: 0 !important;
    border-top: 1px solid #444c56 !important; /* Solid smooth line instead of dots */
    height: 0 !important;
    margin: 2em 0 !important;
    background: transparent !important;
  }

/* 4. SMOOTH SUBSECTION DIVIDERS (##) */
  h2 {
    background: none !important;      /* Kills the Slate dotted image */
    border-bottom: 1px solid #30363d !important; /* Lighter solid line */
    padding-bottom: 10px !important;
    margin-bottom: 20px !important;
  }
  
  /* 5. DARK CODE BLOCKS (Minimal approach) */
  /* This targets the container without breaking your centering or padding */
  .highlighter-rouge, .highlight, pre {
    background-color: #161b22 !important; /* Dark slate gray for contrast */
    border: 1px solid #30363d !important;
    border-radius: 6px !important;
    color: #c9d1d9 !important;
  }

  /* Kills any white/light background on the text container inside */
  pre code {
    background: transparent !important;
    padding: 0 !important;
  }

  @media screen {
    /* ... keep your other screen styles ... */

    /* FIX INVISIBLE VARIABLE NAMES (Aer, qc, execute, etc.) */
    
    /* Variable names (qc, np, kappa) */
    .highlight .nv, .highlight .n { 
      color: #adbac7 !important; /* Light silver/grey for high contrast */
    }

    /* Imported classes and functions (Aer, QuantumCircuit, execute) */
    .highlight .nc, .highlight .nn, .highlight .nf {
      color: #dcbdfb !important; /* Soft lavender/purple */
    }

    /* Function arguments and parameters */
    .highlight .ne, .highlight .ni {
      color: #8dbdff !important; /* Soft blue */
    }

    /* Python Built-ins (print, range) */
    .highlight .nb {
      color: #ffa657 !important; /* Light orange */
    }
  }
</style>



<!-- Cache Buster Link -->
<link rel="stylesheet" href="{{ '/assets/css/style.css?v=' | append: site.time | relative_url }}">

<div id="main_content_wrap">
  <section id="main_content">
    {{ content }}
  </section>
</div>

<script>
  document.addEventListener("DOMContentLoaded", function() {
    const links = document.querySelectorAll('a');
    links.forEach(link => {
      if (link.hostname !== window.location.hostname) {
        link.setAttribute('target', '_blank');
        link.setAttribute('rel', 'noopener noreferrer');
      }
    });
  });
</script>
