---
layout: default
---

<style>
  /* 1. SCREEN VIEW (DARK) */
  @media screen {
    #main_content_wrap {
      background-color: #0d1117 !important;
      display: flex !important;
      justify-content: center !important; 
    }
    #main_content {
      color: #c9d1d9 !important;
      background-color: #0d1117 !important;
    }
  }

  /* 2. PRINTER VIEW (FORCED WHITE) */
 @media print {
    /* Main container resets */
    #main_content_wrap, #main_content, body, html {
      background: white !important;
      background-color: white !important;
      color: black !important;
    }

    /* THE NUCLEAR SYNTAX RESET */
    /* This targets every possible span class used by Rouge/Slate */
    div.highlighter-rouge *, 
    .highlight *, 
    pre *, 
    code * {
      color: black !important;
      background: transparent !important;
      text-shadow: none !important;
      opacity: 1 !important; /* Prevents "faded" light gray looks */
    }

    /* Light gray background for the code box itself */
    div.highlighter-rouge, .highlight, pre {
      background: #f5f5f5 !important;
      border: 1px solid #ddd !important;
    }

    /* Hide web-only elements */
    .top-nav, .bottom-nav, #forkme_banner, footer { 
      display: none !important; 
    }
  }

  /* 3. SHARED LAYOUT (Centering) */
 #main_content {
    max-width: 1500px !important; /* Made it slightly wider as requested */
    width: 100% !important;        
    
    /* THE BALANCE FIX */
    float: none !important;
    margin-left: 6% !important;   /* Manually push from the left to close the right gap */
    margin-right: -1% !important; 
    
    padding: 60px 40px !important; 
    box-sizing: border-box !important;
    display: block !important;
  }

  /* Ensure the parent doesn't restrict the new width */
  #main_content_wrap {
    justify-content: flex-start !important; /* Align to the start so our margin-left works */
  }
  
  img {
    max-width: 100% !important;
    height: auto !important;
    display: block;
    margin: 20px auto;
  }


  /* ... keep your existing screen/centering code ... */

  /* 4. SMOOTH SOLID HORIZONTAL LINES */
  hr {
    border: 0 !important;
    border-top: 1px solid #444c56 !important; /* Solid smooth line instead of dots */
    height: 0 !important;
    margin: 2em 0 !important;
    background: transparent !important;
  }

/* 4. SMOOTH SUBSECTION DIVIDERS (##) */
  h2 {
    background: none !important;      /* Kills the Slate dotted image */
    border-bottom: 1px solid #30363d !important; /* Lighter solid line */
    padding-bottom: 10px !important;
    margin-bottom: 20px !important;
  }
  
  /* 5. DARK CODE BLOCKS (Minimal approach) */
  /* This targets the container without breaking your centering or padding */
  .highlighter-rouge, .highlight, pre {
    background-color: #161b22 !important; /* Dark slate gray for contrast */
    border: 1px solid #30363d !important;
    border-radius: 6px !important;
    color: #c9d1d9 !important;
  }

  /* Kills any white/light background on the text container inside */
  pre code {
    background: transparent !important;
    padding: 0 !important;
  }

  @media screen {
    /* ... keep your other screen styles ... */

    /* FIX INVISIBLE VARIABLE NAMES (Aer, qc, execute, etc.) */
    
    /* Variable names (qc, np, kappa) */
    .highlight .nv, .highlight .n { 
      color: #adbac7 !important; /* Light silver/grey for high contrast */
    }

    /* Imported classes and functions (Aer, QuantumCircuit, execute) */
    .highlight .nc, .highlight .nn, .highlight .nf {
      color: #dcbdfb !important; /* Soft lavender/purple */
    }

    /* Function arguments and parameters */
    .highlight .ne, .highlight .ni {
      color: #8dbdff !important; /* Soft blue */
    }

    /* Python Built-ins (print, range) */
    .highlight .nb {
      color: #ffa657 !important; /* Light orange */
    }

/* FIX INVISIBLE PUNCTUATION & SYMBOLS */
    
    /* Targets ( ) [ ] { } , : ; */
    .highlight .p {
      color: #adbac7 !important; /* Light silver/grey to match the variables */
    }

    /* Targets Operators like = + - * / */
    .highlight .o, .highlight .ow {
      color: #79c0ff !important; /* Bright sky blue so they "pop" */
    }   
  }

  /* Ensure the button is always visible and stays on top */
#theme-toggle {
  display: block !important;
  visibility: visible !important;
  opacity: 1 !important;
}

/* Force body transition for a smooth switch */
body {
  transition: background-color 0.2s ease, color 0.2s ease;
}

/* Update button colors when in light mode so it remains visible */
body.light-mode #theme-toggle {
  background: #f6f8fa !important;
  color: #24292f !important;
  border-color: #d0d7de !important;
}

  /* Ensure the total page background is white in light mode */
html.light-mode, 
body.light-mode {
  background-color: #ffffff !important;
  background-image: none !important; /* Removes Slate's default dark textures */
}

/* Force the outer wrapper to span full width and be white */
body.light-mode #main_content_wrap {
  background-color: #ffffff !important;
  background-image: none !important;
  border: none !important;
}

/* Ensure the content area matches */
body.light-mode #main_content {
  background-color: #ffffff !important;
  color: #24292f !important;
  box-shadow: none !important; /* Removes any inner glow from the theme */
}

  /* FIX TABLE TEXT IN DARK MODE (Screen) */
#main_content table {
  border-color: #444c56 !important;
}

#main_content th {
  background-color: #161b22 !important; /* Slightly lighter than the main background */
  color: #ffffff !important;           /* Pure white for headers */
  border: 1px solid #444c56 !important;
}

#main_content td {
  color: #adbac7 !important;           /* Light grey for body text for better readability */
  border: 1px solid #444c56 !important;
}

/* Ensure Bright Mode tables also flip back correctly */
body.light-mode #main_content table,
body.light-mode #main_content th,
body.light-mode #main_content td {
  border-color: #d0d7de !important;
  color: #24292f !important;
  background-color: #ffffff !important;
}

body.light-mode #main_content th {
  background-color: #f6f8fa !important; /* Light grey header in bright mode */
}

/* Base styling for the toggle button */
#theme-toggle {
  transition: all 0.3s ease-in-out !important;
  outline: none;
}

/* Hover glow effect (Matches your images) */
#theme-toggle:hover {
  box-shadow: 0 0 20px 5px rgba(0, 255, 255, 0.7) !important;
  color: #00ffff !important; /* Cyan text */
  text-shadow: 0 0 8px rgba(0, 255, 255, 0.8); /* Glowy text effect */
  border-color: #00ffff !important;
}

/* Adjust glow for Light Mode so it's not too blinding */
body.light-mode #theme-toggle:hover {
  box-shadow: 0 0 15px 3px rgba(0, 128, 128, 0.4) !important;
  color: #008080 !important; /* Darker teal for readability on white */
  text-shadow: 0 0 5px rgba(0, 128, 128, 0.3);
}


/* Strip table structure to make cells feel like one block */
/* 1. FORCE THE CODE TABLE TO BEHAVE */
.highlight table {
    display: table !important;
    width: 100% !important;
    border-collapse: collapse !important;
}

/* 2. ALIGN NUMBERS AND CODE ROWS */
.highlight td.gutter, 
.highlight td.code {
    vertical-align: top !important;
    padding: 10px 10px !important; /* Ensures they start at the same height */
}

/* 3. FIX THE "ONE LINE" ISSUE */
.highlight td.code pre {
    white-space: pre !important;        /* CRITICAL: Respects all line breaks */
    word-wrap: normal !important;
    display: block !important;
    overflow-x: auto !important;        /* Keeps scrollbar attached to code */
    width: 100% !important;
    margin: 0 !important;
}

/* 4. MATCH FONTS EXACTLY (to prevent drift) */
.highlight .gutter pre, 
.highlight .code pre,
.highlight code {
    font-family: "Courier New", Courier, monospace !important;
    line-height: 1.5 !important;
    font-size: 14px !important;
}

/* 5. SLIM DOWN THE NUMBER COLUMN */
.highlight .gutter {
    width: 1% !important;
    min-width: 45px !important;
    border-right: 1px solid #30363d !important; /* Visual divider */
    text-align: right;
}




</style>

<!-- toggl;e button to change dark mode to bright mode and vice versa  of the webpage by the user -->
<button id="theme-toggle" style="position: fixed; top: 80px; right: 20px; z-index: 9999; padding: 10px 15px; cursor: pointer; background: #24292f; color: white; border: 1px solid #444c56; border-radius: 6px; font-weight: bold; display: block !important; visibility: visible !important;">
  Switch to Bright Mode
</button>

<!-- Cache Buster Link -->
<link rel="stylesheet" href="{{ '/assets/css/style.css?v=' | append: site.time | relative_url }}">

<div id="main_content_wrap">
  <section id="main_content">
    {{ content }}
  </section>
</div>

<script>
  document.addEventListener("DOMContentLoaded", function() {
    const links = document.querySelectorAll('a');
    links.forEach(link => {
      if (link.hostname !== window.location.hostname) {
        link.setAttribute('target', '_blank');
        link.setAttribute('rel', 'noopener noreferrer');
      }
    });
  });
</script>

<script>
  const btn = document.getElementById("theme-toggle");

  function updateButton(isLight) {
    // Keeps your text but adds the optical symbols
    btn.textContent = isLight ? "☾ | Switch to Dark Mode" : "☉ | Switch to Bright Mode";
    
    // Adjusts button colors to contrast with the current mode
    btn.style.background = isLight ? "#f6f8fa" : "#24292f";
    btn.style.color = isLight ? "#24292f" : "white";
    btn.style.borderColor = isLight ? "#d0d7de" : "#444c56";
  }

  // Apply saved theme on page load
  if (localStorage.getItem("theme") === "light") {
    document.body.classList.add("light-mode");
    document.documentElement.classList.add("light-mode");
    updateButton(true);
  } else {
    updateButton(false);
  }

  btn.addEventListener("click", function() {
    const isLight = document.body.classList.toggle("light-mode");
    document.documentElement.classList.toggle("light-mode");
    
    updateButton(isLight);
    localStorage.setItem("theme", isLight ? "light" : "dark");
  });
</script>
