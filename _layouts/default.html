---
layout: default
---

<style>
  /* ONLY APPLY DARK THEME ON SCREENS */
  @media screen {
    #main_content_wrap {
      display: flex !important;
      justify-content: center !important;
      background: #0d1117 !important; /* Dark background only for screen */
    }

    #main_content {
      color: #c9d1d9 !important;      /* Light text only for screen */
      max-width: 900px !important;
      width: 85% !important;
      margin: 0 auto !important;
      padding: 60px 40px !important;
      float: none !important;
    }
  }

  /* SHARED LAYOUT (Applying to both Screen and Print) */
  #main_content {
    max-width: 900px !important;
    width: 85% !important;
    margin: 0 auto !important;
  }

  img {
    max-width: 100% !important;
    height: auto !important;
    display: block;
    margin: 20px auto;
  }
</style>


<!-- Cache Buster Link -->
<link rel="stylesheet" href="{{ '/assets/css/style.css?v=' | append: site.time | relative_url }}">

<div id="main_content_wrap">
  <section id="main_content">
    {{ content }}
  </section>
</div>

<script>
  document.addEventListener("DOMContentLoaded", function() {
    const links = document.querySelectorAll('a');
    links.forEach(link => {
      if (link.hostname !== window.location.hostname) {
        link.setAttribute('target', '_blank');
        link.setAttribute('rel', 'noopener noreferrer');
      }
    });
  });
</script>
